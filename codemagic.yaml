workflows:
  android-apk:
    name: Solo Leveling APK Forge
    max_build_duration: 60
    instance_type: linux
    environment:
      node: latest
      java: 17
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Install dependencies
        script: |
          npm install --legacy-peer-deps
      - name: Expo Prebuild
        script: |
          npx expo prebuild --platform android --non-interactive
      - name: Build Android APK
        script: |
          cd android
          ./gradlew assembleRelease
    artifacts:
      - android/app/build/outputs/apk/release/*.apk
    publishing:
      email:
        recipients:
          - your-email@example.com # Update this to your email
        notify:
          success: true
          failure: true